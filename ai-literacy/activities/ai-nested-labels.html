<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Many Labels Apply?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8f9fa;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 0.6rem 1rem;
    background: #fff;
    border-bottom: 1px solid #e1e4e8;
    font-size: 0.9rem;
    color: #444;
    flex-shrink: 0;
  }
  .header strong { color: #1a1a1a; }

  .main {
    flex: 1;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  .progress {
    font-size: 0.8rem;
    color: #6a737d;
  }

  .tech-card {
    background: #fff;
    border: 1px solid #e1e4e8;
    border-radius: 10px;
    padding: 1.2rem;
  }

  .tech-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6a737d;
    margin-bottom: 0.4rem;
  }

  .tech-name {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.3rem;
  }

  .tech-desc {
    font-size: 0.85rem;
    color: #555;
    line-height: 1.5;
  }

  .question {
    font-size: 0.92rem;
    color: #333;
    font-weight: 500;
  }

  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.8rem;
    background: #fff;
    border: 2px solid #d1d9e0;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.12s, background 0.12s;
    font-size: 0.88rem;
  }
  .check-item:hover { border-color: #2563eb; background: #f8fbff; }
  .check-item.selected { border-color: #2563eb; background: #eff6ff; }
  .check-item.correct { border-color: #1a7f37; background: #ecfdf5; }
  .check-item.wrong { border-color: #cf222e; background: #fef2f2; }
  .check-item.missed { border-color: #f97316; background: #fff7ed; }
  .check-item.revealed { cursor: default; }

  .check-box {
    width: 18px;
    height: 18px;
    border: 2px solid #d1d9e0;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    transition: border-color 0.12s, background 0.12s;
  }
  .check-item.selected .check-box { border-color: #2563eb; background: #2563eb; color: #fff; }
  .check-item.correct .check-box { border-color: #1a7f37; background: #1a7f37; color: #fff; }
  .check-item.wrong .check-box { border-color: #cf222e; background: #cf222e; color: #fff; }
  .check-item.missed .check-box { border-color: #f97316; background: #fff; color: #f97316; font-weight: 700; }

  .check-name { font-weight: 600; }
  .check-why {
    font-size: 0.8rem;
    color: #555;
    line-height: 1.4;
    display: none;
    margin-top: 0.3rem;
  }
  .check-item.correct .check-why,
  .check-item.missed .check-why { display: block; }

  .check-content { flex: 1; }

  .footer {
    padding: 0.6rem 1rem;
    background: #fff;
    border-top: 1px solid #e1e4e8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .status { font-size: 0.88rem; color: #6a737d; }

  button {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #d1d9e0;
    background: #fff;
    color: #1a1a1a;
    transition: background 0.1s;
  }
  button:hover:not(:disabled) { background: #f3f4f6; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button.primary:hover:not(:disabled) { background: #1d4ed8; }

  .done-msg {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    border-radius: 8px;
    padding: 0.9rem 1rem;
    font-size: 0.88rem;
    color: #065f46;
    line-height: 1.55;
    display: none;
  }
  .done-msg.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <strong>How Many Labels Apply?</strong> — Check every term that correctly describes this technology.
</div>

<div class="main">
  <div class="progress" id="progress"></div>

  <div class="tech-card">
    <div class="tech-label">Technology</div>
    <div class="tech-name" id="tech-name"></div>
    <div class="tech-desc" id="tech-desc"></div>
  </div>

  <div class="question">Which of these labels apply? Check all that are correct.</div>

  <div class="checkboxes" id="checkboxes"></div>

  <div class="done-msg" id="done-msg"></div>
</div>

<div class="footer">
  <span class="status" id="status">Select at least one answer.</span>
  <div style="display:flex;gap:0.5rem">
    <button id="btn-check" class="primary" disabled>Check</button>
    <button id="btn-next" style="display:none">Next</button>
  </div>
</div>

<script>
const LABELS = [
  { id: "ai",    name: "Artificial Intelligence (AI)" },
  { id: "ml",    name: "Machine Learning (ML)" },
  { id: "nn",    name: "Neural Networks / Deep Learning" },
  { id: "genai", name: "Generative AI" },
];

const questions = [
  {
    name: "Pathfinding AI in a video game",
    desc: "The game enemy calculates the shortest route to the player using a programmed search algorithm. A developer wrote the rules for how it explores paths.",
    correct: ["ai"],
    why: {
      ai:    "Any system that lets a machine make intelligent decisions is AI. This fits.",
      ml:    "There's no learning from data here. The rules are hand-coded.",
      nn:    "No neural network involved. It's a search algorithm.",
      genai: "It doesn't generate content. It navigates.",
    }
  },
  {
    name: "House price prediction model",
    desc: "A model trained on thousands of past home sales. Given square footage, location, and number of bedrooms, it predicts what a house will sell for.",
    correct: ["ai", "ml"],
    why: {
      ai:    "It makes intelligent predictions, so it counts as AI.",
      ml:    "It learned patterns from labeled training data. That's machine learning.",
      nn:    "Simple regression models don't need neural networks. Many house price models use decision trees or linear regression instead.",
      genai: "It predicts a number. It doesn't generate text, images, or new content.",
    }
  },
  {
    name: "Image recognition system",
    desc: "A system trained on millions of labeled photos that can identify objects in new images, like telling a cat from a dog or detecting a stop sign.",
    correct: ["ai", "ml", "nn"],
    why: {
      ai:    "It makes intelligent decisions about what it sees.",
      ml:    "It learned from labeled training data.",
      nn:    "Image recognition at this scale almost always uses convolutional neural networks. The pattern complexity requires it.",
      genai: "It classifies images. It doesn't create new ones.",
    }
  },
  {
    name: "ChatGPT",
    desc: "A conversational AI assistant that can answer questions, write code, summarize documents, and hold a multi-turn conversation.",
    correct: ["ai", "ml", "nn", "genai"],
    why: {
      ai:    "Definitely AI. It simulates intelligent conversation.",
      ml:    "It was trained on massive amounts of text data. That's machine learning.",
      nn:    "LLMs are transformer-based neural networks with billions of parameters.",
      genai: "It generates new text on demand. That's the definition of generative AI.",
    }
  },
];

let current = 0;
let selected = new Set();
let revealed = false;

const progressEl = document.getElementById("progress");
const techNameEl = document.getElementById("tech-name");
const techDescEl = document.getElementById("tech-desc");
const checkboxesEl = document.getElementById("checkboxes");
const statusEl = document.getElementById("status");
const btnCheck = document.getElementById("btn-check");
const btnNext = document.getElementById("btn-next");
const doneMsg = document.getElementById("done-msg");

function render() {
  const q = questions[current];
  progressEl.textContent = `${current + 1} of ${questions.length}`;
  techNameEl.textContent = q.name;
  techDescEl.textContent = q.desc;
  checkboxesEl.innerHTML = "";
  selected.clear();
  revealed = false;
  doneMsg.classList.remove("visible");

  for (const label of LABELS) {
    const item = document.createElement("div");
    item.className = "check-item";
    item.dataset.id = label.id;

    const box = document.createElement("div");
    box.className = "check-box";

    const content = document.createElement("div");
    content.className = "check-content";

    const name = document.createElement("div");
    name.className = "check-name";
    name.textContent = label.name;

    const why = document.createElement("div");
    why.className = "check-why";
    why.textContent = q.why[label.id];

    content.appendChild(name);
    content.appendChild(why);
    item.appendChild(box);
    item.appendChild(content);
    checkboxesEl.appendChild(item);

    item.addEventListener("click", () => {
      if (revealed) return;
      if (selected.has(label.id)) {
        selected.delete(label.id);
        item.classList.remove("selected");
        box.textContent = "";
      } else {
        selected.add(label.id);
        item.classList.add("selected");
        box.textContent = "✓";
      }
      btnCheck.disabled = selected.size === 0;
      statusEl.textContent = selected.size === 0 ? "Select at least one answer." : `${selected.size} selected.`;
      statusEl.className = "status";
    });
  }

  btnCheck.disabled = true;
  btnCheck.style.display = "";
  btnNext.style.display = "none";
  statusEl.textContent = "Select at least one answer.";
  statusEl.className = "status";
}

btnCheck.addEventListener("click", () => {
  revealed = true;
  const q = questions[current];
  const correct = new Set(q.correct);
  let allRight = true;

  for (const item of checkboxesEl.querySelectorAll(".check-item")) {
    const id = item.dataset.id;
    const box = item.querySelector(".check-box");
    const isSelected = selected.has(id);
    const isCorrect = correct.has(id);

    item.classList.remove("selected");
    item.classList.add("revealed");

    if (isSelected && isCorrect) {
      item.classList.add("correct");
      box.textContent = "✓";
    } else if (isSelected && !isCorrect) {
      item.classList.add("wrong");
      box.textContent = "✗";
      allRight = false;
    } else if (!isSelected && isCorrect) {
      item.classList.add("missed");
      box.textContent = "!";
      allRight = false;
    }
  }

  if (allRight) {
    statusEl.textContent = "Correct!";
    statusEl.className = "status correct";
  } else {
    statusEl.textContent = "Not quite. Orange = you missed it. Read the explanations below each label.";
    statusEl.className = "status wrong";
  }

  btnCheck.style.display = "none";
  if (current < questions.length - 1) {
    btnNext.textContent = "Next";
    btnNext.style.display = "";
  } else {
    btnNext.textContent = "Done";
    btnNext.style.display = "";
  }
});

btnNext.addEventListener("click", () => {
  if (current < questions.length - 1) {
    current++;
    render();
  } else {
    doneMsg.classList.add("visible");
    doneMsg.innerHTML = "<strong>Key takeaway:</strong> These categories nest inside each other. Generative AI is always also Neural Networks, which is always also Machine Learning, which is always also AI. The label you use depends on what aspect you're describing, not which bucket something belongs to.";
    btnNext.style.display = "none";
    statusEl.textContent = "All done.";
    statusEl.className = "status";
  }
});

render();
</script>
</body>
</html>
