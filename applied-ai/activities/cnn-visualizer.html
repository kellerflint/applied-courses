<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNN Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .bar {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .bar-title {
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }

    .bar-sub {
      font-size: 12px;
      color: #777;
      margin-top: 1px;
    }

    .bar a {
      font-size: 12px;
      color: #0066cc;
      text-decoration: none;
    }

    .bar a:hover { text-decoration: underline; }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    .fallback {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 40px;
      text-align: center;
      color: #444;
    }

    .fallback p { font-size: 14px; line-height: 1.6; max-width: 420px; }

    .fallback a {
      display: inline-block;
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    .fallback a:hover { background: #0052a3; }
  </style>
</head>
<body>
  <div class="bar">
    <div>
      <div class="bar-title">CNN 2D Visualizer</div>
      <div class="bar-sub">by Adam Harley</div>
    </div>
    <a href="https://adamharley.com/nn_vis/cnn/2d.html" target="_blank">Open in new tab ↗</a>
  </div>

  <iframe
    id="viz"
    src="https://adamharley.com/nn_vis/cnn/2d.html"
    title="CNN 2D Visualizer by Adam Harley"
    sandbox="allow-scripts allow-same-origin"
  ></iframe>

  <div class="fallback" id="fallback">
    <p>The visualizer couldn't be embedded here. Open it directly to interact with it.</p>
    <a href="https://adamharley.com/nn_vis/cnn/2d.html" target="_blank">Open CNN Visualizer ↗</a>
  </div>

  <script>
    const iframe = document.getElementById('viz');
    const fallback = document.getElementById('fallback');

    iframe.addEventListener('error', () => {
      iframe.style.display = 'none';
      fallback.style.display = 'flex';
    });

    // Some sites block iframes silently — show fallback if nothing loads after 4s
    setTimeout(() => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc || doc.readyState === 'loading') {
          iframe.style.display = 'none';
          fallback.style.display = 'flex';
        }
      } catch (e) {
        // cross-origin access blocked means it DID load — leave iframe visible
      }
    }, 4000);
  </script>
</body>
</html>
