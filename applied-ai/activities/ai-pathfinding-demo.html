<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinding: rules-based AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8f9fa;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 0.6rem 1rem;
    background: #fff;
    border-bottom: 1px solid #e1e4e8;
    font-size: 0.85rem;
    color: #444;
    flex-shrink: 0;
  }
  .header strong { color: #1a1a1a; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    flex: 1;
    padding: 1rem 1.1rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #fff;
  }

  .panel-left {
    border-right: 1px solid #e1e4e8;
  }

  .panel-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6a737d;
    margin-bottom: 0.6rem;
    flex-shrink: 0;
  }

  .pseudocode {
    font-family: "SF Mono", "Monaco", "Menlo", monospace;
    font-size: 0.82rem;
    line-height: 1.6;
    flex: 1;
    overflow-y: auto;
  }

  .pcline {
    display: block;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    color: #333;
    white-space: pre-wrap;
    transition: background 0.15s;
    margin-bottom: 0.15rem;
  }

  .pcline.active {
    background: #fef3c7;
    color: #1a1a1a;
    font-weight: 600;
  }

  .pcnum {
    color: #9ca3af;
    user-select: none;
    margin-right: 0.6rem;
    font-weight: 400;
  }
  .pcline.active .pcnum { color: #ca8a04; }

  .grid-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    width: 100%;
    max-width: 380px;
    aspect-ratio: 8 / 5;
  }

  .cell {
    background: #f3f4f6;
    border-radius: 4px;
    position: relative;
    transition: background 0.2s, outline 0.12s;
    outline: 2px solid transparent;
    outline-offset: -1px;
  }

  .cell.wall { background: #1f2937; }
  .cell.queued { background: #bfdbfe; }
  .cell.current { background: #2563eb; }
  .cell.explored { background: #e5e7eb; }
  .cell.path { background: #86efac; }

  .cell.flash { outline-color: #f59e0b; }

  .cell-marker {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: #1a1a1a;
    pointer-events: none;
  }
  .cell.current .cell-marker { color: #fff; }

  .legend {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-top: 0.7rem;
    font-size: 0.7rem;
    color: #6a737d;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.08);
  }

  .footer {
    padding: 0.7rem 1rem;
    background: #fff;
    border-top: 1px solid #e1e4e8;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  button {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.45rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #d1d9e0;
    background: #fff;
    color: #1a1a1a;
    transition: background 0.1s;
  }
  button:hover:not(:disabled) { background: #f3f4f6; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button.primary:hover:not(:disabled) { background: #1d4ed8; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: #6a737d;
  }
  .speed-control input[type="range"] { width: 100px; }

  .status {
    margin-left: auto;
    font-size: 0.82rem;
    color: #6a737d;
  }
  .status.success { color: #1a7f37; font-weight: 600; }

  @media (max-width: 720px) {
    .main { flex-direction: column; }
    .panel-left { border-right: none; border-bottom: 1px solid #e1e4e8; }
    .grid { max-width: 280px; }
    .footer { padding: 0.6rem 0.7rem; gap: 0.5rem; }
    button { padding: 0.4rem 0.7rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <strong>BFS Pathfinding</strong> &nbsp;A search algorithm following rules a programmer wrote.
</div>

<div class="main">
  <div class="panel panel-left">
    <div class="panel-label">Pseudocode</div>
    <div class="pseudocode" id="pseudocode"></div>
  </div>
  <div class="panel panel-right">
    <div class="panel-label">Grid</div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#bfdbfe"></div>In queue</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#2563eb"></div>Current</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#e5e7eb"></div>Explored</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#86efac"></div>Path</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#1f2937"></div>Wall</div>
    </div>
  </div>
</div>

<div class="footer">
  <button id="btn-reset">Reset</button>
  <button id="btn-play" class="primary">Play</button>
  <button id="btn-step">Step</button>
  <div class="speed-control">
    Speed
    <input type="range" id="speed" min="100" max="1200" step="100" value="500">
  </div>
  <div class="status" id="status">Ready. Press Play or Step.</div>
</div>

<script>
const COLS = 8;
const ROWS = 5;
const START = [0, 2];
const GOAL = [7, 2];
const WALLS = ["4,0", "4,1", "4,2"];
const WALL_SET = new Set(WALLS);

const PSEUDOCODE = [
  { num: "1.", text: "Put the start cell in the queue" },
  { num: "2.", text: "Take the front cell out of the queue" },
  { num: "3.", text: "If it's the goal, trace the path back. Done." },
  { num: "4.", text: "Look at each neighbor: if it hasn't been visited, mark it and add it to the queue" },
];

function key(cell) { return `${cell[0]},${cell[1]}`; }
function cellEq(a, b) { return a[0] === b[0] && a[1] === b[1]; }
function inBounds(cell) {
  return cell[0] >= 0 && cell[0] < COLS && cell[1] >= 0 && cell[1] < ROWS;
}
function isWall(cell) { return WALL_SET.has(key(cell)); }

function getNeighbors(cell) {
  const [x, y] = cell;
  const all = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
  return all.filter(c => inBounds(c) && !isWall(c));
}

function generateSteps() {
  const steps = [];
  const visited = new Set();
  const parent = new Map();
  const queue = [];

  // Step: line 1, enqueue start
  visited.add(key(START));
  queue.push(START);
  steps.push({ line: 1, stateChanges: [{cell: START, state: 'queued'}], highlights: [] });

  let goalFound = false;

  while (queue.length > 0 && !goalFound) {
    // Line 2: dequeue
    const cur = queue.shift();
    steps.push({ line: 2, stateChanges: [{cell: cur, state: 'current'}], highlights: [] });

    // Line 3: goal check
    if (cellEq(cur, GOAL)) {
      // Trace path back
      const path = [];
      let c = cur;
      while (c) {
        path.unshift(c);
        const k = key(c);
        c = parent.has(k) ? parent.get(k) : null;
      }
      // Goal-check step (just the highlight on line 3, no state change)
      steps.push({ line: 3, stateChanges: [], highlights: [] });
      // Trace each cell, one per step, on line 3
      for (const p of path) {
        steps.push({ line: 3, stateChanges: [{cell: p, state: 'path'}], highlights: [] });
      }
      goalFound = true;
      break;
    } else {
      steps.push({ line: 3, stateChanges: [], highlights: [] });
    }

    // Line 4: per-neighbor check
    const neighbors = getNeighbors(cur);
    for (const n of neighbors) {
      if (visited.has(key(n))) {
        steps.push({ line: 4, stateChanges: [], highlights: [{cell: n}] });
      } else {
        visited.add(key(n));
        parent.set(key(n), cur);
        queue.push(n);
        steps.push({
          line: 4,
          stateChanges: [{cell: n, state: 'queued'}],
          highlights: [{cell: n}]
        });
      }
    }
  }

  return steps;
}

const STEPS = generateSteps();

const gridEl = document.getElementById('grid');
const pseudoEl = document.getElementById('pseudocode');
const statusEl = document.getElementById('status');
const btnReset = document.getElementById('btn-reset');
const btnPlay = document.getElementById('btn-play');
const btnStep = document.getElementById('btn-step');
const speedEl = document.getElementById('speed');

// Build grid DOM (row-major: y outer, x inner)
const cellEls = {};
for (let y = 0; y < ROWS; y++) {
  for (let x = 0; x < COLS; x++) {
    const div = document.createElement('div');
    div.className = 'cell';
    if (isWall([x, y])) div.classList.add('wall');
    if (cellEq([x, y], START)) {
      const m = document.createElement('div');
      m.className = 'cell-marker';
      m.textContent = 'S';
      div.appendChild(m);
    }
    if (cellEq([x, y], GOAL)) {
      const m = document.createElement('div');
      m.className = 'cell-marker';
      m.textContent = 'G';
      div.appendChild(m);
    }
    gridEl.appendChild(div);
    cellEls[`${x},${y}`] = div;
  }
}

// Pseudocode lines
for (const line of PSEUDOCODE) {
  const div = document.createElement('div');
  div.className = 'pcline';
  div.dataset.line = line.num.replace('.', '');
  div.innerHTML = `<span class="pcnum">${line.num}</span>${line.text}`;
  pseudoEl.appendChild(div);
}

let currentStep = -1;
let playing = false;
let playTimer = null;

function applyStateUpToStep(stepIdx) {
  // Reset all non-wall cells
  for (const k in cellEls) {
    const el = cellEls[k];
    if (!el.classList.contains('wall')) {
      el.classList.remove('queued', 'current', 'explored', 'path');
    }
    el.classList.remove('flash');
  }

  if (stepIdx < 0) {
    setActiveLine(null);
    statusEl.textContent = 'Ready. Press Play or Step.';
    statusEl.className = 'status';
    return;
  }

  let prevCurrent = null;

  for (let i = 0; i <= stepIdx; i++) {
    const step = STEPS[i];
    for (const change of step.stateChanges) {
      const k = key(change.cell);
      const el = cellEls[k];
      if (!el) continue;

      // Path is terminal: once a cell is path, keep it path
      if (el.classList.contains('path')) continue;

      if (change.state === 'current') {
        // Demote the previous current cell to explored
        if (prevCurrent && prevCurrent !== k) {
          const prevEl = cellEls[prevCurrent];
          if (prevEl && !prevEl.classList.contains('path')) {
            prevEl.classList.remove('current', 'queued');
            prevEl.classList.add('explored');
          }
        }
        el.classList.remove('queued', 'explored');
        el.classList.add('current');
        prevCurrent = k;
      } else if (change.state === 'queued') {
        if (!el.classList.contains('current')) {
          el.classList.remove('explored');
          el.classList.add('queued');
        }
      } else if (change.state === 'path') {
        el.classList.remove('queued', 'current', 'explored');
        el.classList.add('path');
      }
    }
  }

  // Highlights only on the visible step
  const step = STEPS[stepIdx];
  for (const h of step.highlights) {
    const el = cellEls[key(h.cell)];
    if (el) el.classList.add('flash');
  }

  setActiveLine(step.line);

  if (stepIdx === STEPS.length - 1) {
    statusEl.textContent = `Goal reached. Path traced in ${STEPS.length} steps.`;
    statusEl.className = 'status success';
  } else {
    statusEl.textContent = `Step ${stepIdx + 1} of ${STEPS.length}`;
    statusEl.className = 'status';
  }
}

function setActiveLine(lineNum) {
  document.querySelectorAll('.pcline').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.line) === lineNum);
  });
}

function step() {
  if (currentStep >= STEPS.length - 1) {
    pause();
    return;
  }
  currentStep++;
  applyStateUpToStep(currentStep);
}

function play() {
  if (currentStep >= STEPS.length - 1) {
    reset();
  }
  playing = true;
  btnPlay.textContent = 'Pause';
  scheduleNext();
}

function pause() {
  playing = false;
  btnPlay.textContent = 'Play';
  if (playTimer) {
    clearTimeout(playTimer);
    playTimer = null;
  }
}

function scheduleNext() {
  if (!playing) return;
  if (currentStep >= STEPS.length - 1) {
    pause();
    return;
  }
  const delay = Number(speedEl.value);
  playTimer = setTimeout(() => {
    step();
    scheduleNext();
  }, delay);
}

function reset() {
  pause();
  currentStep = -1;
  applyStateUpToStep(-1);
}

btnReset.addEventListener('click', reset);
btnStep.addEventListener('click', () => {
  pause();
  step();
});
btnPlay.addEventListener('click', () => {
  if (playing) pause();
  else play();
});

applyStateUpToStep(-1);
</script>
</body>
</html>
