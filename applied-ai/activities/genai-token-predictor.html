<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How an LLM generates text</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8f9fa;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 0.6rem 1rem;
    background: #fff;
    border-bottom: 1px solid #e1e4e8;
    font-size: 0.85rem;
    color: #444;
    flex-shrink: 0;
  }
  .header strong { color: #1a1a1a; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  .left {
    flex: 1.3;
    padding: 1rem 1.1rem;
    border-right: 1px solid #e1e4e8;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    min-width: 0;
    overflow: hidden;
  }

  .right {
    flex: 1;
    padding: 1rem 1.1rem;
    background: #fff;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .panel-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6a737d;
    margin-bottom: 0.4rem;
    flex-shrink: 0;
  }

  .prompt-box {
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    font-size: 0.85rem;
    color: #4b5563;
    line-height: 1.5;
    flex-shrink: 0;
  }

  .response-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .response-box {
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    border-radius: 8px;
    padding: 0.85rem 1rem;
    font-size: 0.95rem;
    color: #1a1a1a;
    line-height: 1.6;
    flex: 1;
    overflow-y: auto;
    word-wrap: break-word;
  }

  .response-box .new-token {
    display: inline-block;
    animation: tokenIn 220ms ease-out;
  }
  @keyframes tokenIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1.05em;
    background: #9ca3af;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s steps(1, end) infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .cursor.done { display: none; }

  .bars {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    padding-right: 0.2rem;
  }

  .bar {
    display: grid;
    grid-template-columns: 70px 1fr 38px;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
  }

  .bar-token {
    font-family: "SF Mono", "Monaco", "Menlo", monospace;
    font-size: 0.78rem;
    color: #374151;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    background: #f3f4f6;
    border-radius: 4px;
    height: 18px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #93c5fd;
    border-radius: 4px;
    transition: width 280ms ease, background 200ms ease;
  }

  .bar.active .bar-fill {
    background: #22c55e;
  }
  .bar.active .bar-token {
    color: #15803d;
    font-weight: 700;
  }
  .bar.active .bar-pct {
    color: #15803d;
    font-weight: 700;
  }

  .bar-pct {
    font-size: 0.74rem;
    color: #6a737d;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .footer {
    padding: 0.6rem 1rem;
    background: #fff;
    border-top: 1px solid #e1e4e8;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  button, select {
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #d1d9e0;
    background: #fff;
    color: #1a1a1a;
    transition: background 0.1s;
  }
  button:hover { background: #f3f4f6; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button.primary:hover { background: #1d4ed8; }

  select { padding: 0.4rem 0.6rem; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: #6a737d;
  }
  .speed-control input[type="range"] { width: 90px; }

  @media (max-width: 720px) {
    .main { flex-direction: column; }
    .left { border-right: none; border-bottom: 1px solid #e1e4e8; flex: none; height: 50%; }
    .right { flex: none; height: 50%; }
    .footer { padding: 0.5rem 0.7rem; gap: 0.5rem; }
    button, select { font-size: 0.76rem; padding: 0.35rem 0.6rem; }
  }
</style>
</head>
<body>

<div class="header">
  <strong>How an LLM generates text</strong> &nbsp;Predict the next token, add it, repeat.
</div>

<div class="main">
  <div class="left">
    <div>
      <div class="panel-label">Prompt</div>
      <div class="prompt-box" id="prompt-box"></div>
    </div>
    <div class="response-section">
      <div class="panel-label">Response (generated token by token)</div>
      <div class="response-box" id="response-box"><span id="response-text"></span><span class="cursor" id="cursor"></span></div>
    </div>
  </div>
  <div class="right">
    <div class="panel-label">Next-token probabilities</div>
    <div class="bars" id="bars"></div>
  </div>
</div>

<div class="footer">
  <button id="btn-restart">Restart</button>
  <button id="btn-play" class="primary">Pause</button>
  <select id="prompt-select"></select>
  <div class="speed-control">
    Speed
    <input type="range" id="speed" min="200" max="2500" step="100" value="1400">
  </div>
</div>

// Tokens that should not have a leading space when joined
const NO_LEADING_SPACE = new Set([",", ".", "!", "?", ";", ":"]);

const promptBoxEl = document.getElementById('prompt-box');
const responseTextEl = document.getElementById('response-text');
const cursorEl = document.getElementById('cursor');
const barsEl = document.getElementById('bars');
const btnRestart = document.getElementById('btn-restart');
const btnPlay = document.getElementById('btn-play');
const promptSelect = document.getElementById('prompt-select');
const speedEl = document.getElementById('speed');

let currentPrompt = PROMPTS[0];
let stepIndex = 0;
let playing = true;
let timer = null;

// Populate prompt selector
for (const p of PROMPTS) {
  const opt = document.createElement('option');
  opt.value = p.id;
  opt.textContent = p.label;
  promptSelect.appendChild(opt);
}

function loadPrompt(id) {
  currentPrompt = PROMPTS.find(p => p.id === id) || PROMPTS[0];
  promptBoxEl.textContent = currentPrompt.prompt;
  responseTextEl.innerHTML = '';
  stepIndex = 0;
  cursorEl.classList.remove('done');
  renderBars(currentPrompt.steps[0].candidates, false);
  if (playing) scheduleNext();
}

function renderBars(candidates, markActive) {
  // Sort by prob descending (data is already sorted, but be safe)
  const sorted = [...candidates].sort((a, b) => b.prob - a.prob);
  const max = sorted[0].prob;
  barsEl.innerHTML = '';
  for (let i = 0; i < sorted.length; i++) {
    const c = sorted[i];
    const div = document.createElement('div');
    div.className = 'bar' + (markActive && i === 0 ? ' active' : '');
    const widthPct = (c.prob / max) * 100;
    div.innerHTML = `
      <div class="bar-token">${escapeHtml(c.token)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${widthPct}%"></div></div>
      <div class="bar-pct">${Math.round(c.prob * 100)}%</div>
    `;
    barsEl.appendChild(div);
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function appendToken(token) {
  const span = document.createElement('span');
  span.className = 'new-token';
  const lead = NO_LEADING_SPACE.has(token) ? '' : ' ';
  span.textContent = lead + token;
  responseTextEl.appendChild(span);
  // Scroll response box to bottom
  const box = document.getElementById('response-box');
  box.scrollTop = box.scrollHeight;
}

function doStep() {
  if (stepIndex >= currentPrompt.steps.length) {
    // Done
    cursorEl.classList.add('done');
    playing = false;
    btnPlay.textContent = 'Play';
    return;
  }
  const step = currentPrompt.steps[stepIndex];
  // Show bars with the top one highlighted
  renderBars(step.candidates, true);
  // Append the chosen token (top candidate)
  const chosen = [...step.candidates].sort((a, b) => b.prob - a.prob)[0];
  appendToken(chosen.token);
  stepIndex++;
}

function scheduleNext() {
  if (timer) {
    clearTimeout(timer);
    timer = null;
  }
  if (!playing) return;
  if (stepIndex >= currentPrompt.steps.length) {
    cursorEl.classList.add('done');
    playing = false;
    btnPlay.textContent = 'Play';
    return;
  }
  const delay = Number(speedEl.value);
  timer = setTimeout(() => {
    doStep();
    scheduleNext();
  }, delay);
}

function play() {
  if (stepIndex >= currentPrompt.steps.length) {
    // Restart from beginning if at end
    loadPrompt(currentPrompt.id);
  }
  playing = true;
  btnPlay.textContent = 'Pause';
  cursorEl.classList.remove('done');
  scheduleNext();
}

function pause() {
  playing = false;
  btnPlay.textContent = 'Play';
  if (timer) {
    clearTimeout(timer);
    timer = null;
  }
}

btnRestart.addEventListener('click', () => {
  pause();
  loadPrompt(currentPrompt.id);
  play();
});

btnPlay.addEventListener('click', () => {
  if (playing) pause();
  else play();
});

promptSelect.addEventListener('change', () => {
  pause();
  loadPrompt(promptSelect.value);
  play();
});

// Speed change resets the current schedule so the new speed takes effect immediately
speedEl.addEventListener('input', () => {
  if (playing) scheduleNext();
});

// Initial load
loadPrompt(currentPrompt.id);
play();
</script>
</body>
</html>
